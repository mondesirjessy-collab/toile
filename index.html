<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TOILE — moteur de simulation textile · phase 0</title>
  <style>
    :root { color-scheme: dark; }
    * { margin: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      background: #0e0f12;
      color: #ede9df;
      font-family: ui-monospace, 'SF Mono', 'Cascadia Code', Menlo, monospace;
      overflow: hidden;
    }
    #view { width: 100vw; height: 100vh; display: block; touch-action: none; cursor: grab; }
    #view:active { cursor: grabbing; }
    /* 2D mirror of the WebGPU canvas: some systems fail to present WebGPU
       frames to screen while the content is correct — a plain 2D canvas
       always composites. Clicks pass through to #view underneath. */
    #mirror {
      position: fixed; inset: 0; width: 100vw; height: 100vh;
      pointer-events: none; z-index: 1;
    }
    header { z-index: 5; }
    /* 2D cutting-layout inset (CLO-style dual view). */
    #patternBox {
      position: fixed; left: 14px; bottom: 14px; z-index: 6;
      pointer-events: none;
      background: rgba(10, 11, 14, 0.55);
      border: 1px solid rgba(237, 233, 223, 0.15);
      border-radius: 6px; padding: 8px 10px 6px;
    }
    #patternBox .label {
      font-size: 10px; letter-spacing: 0.1em; opacity: 0.55; display: block;
      margin-bottom: 4px;
    }
    #pattern { display: block; }
    header {
      position: fixed; top: 0; left: 0; right: 0;
      display: flex; justify-content: space-between; align-items: baseline;
      padding: 14px 18px; pointer-events: none;
      font-size: 12px; letter-spacing: 0.08em;
    }
    header .title { font-weight: 700; }
    header .title small { font-weight: 400; opacity: 0.45; margin-left: 10px; }
    .hud-col { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
    #hud { opacity: 0.6; font-variant-numeric: tabular-nums; }
    #hint { opacity: 0.4; font-size: 11px; }
    /* Drop lil-gui below the header bar so it doesn't overlap the HUD. */
    .lil-gui.lil-root { top: 46px; z-index: 10; }
    #overlay {
      position: fixed; inset: 0; display: grid; place-content: center;
      background: #0e0f12; text-align: center; padding: 24px; gap: 10px;
      z-index: 20;
    }
    /* Author display:grid would otherwise defeat the hidden attribute, leaving
       an invisible full-screen layer that swallows every pointer event. */
    #overlay[hidden] { display: none; }
    #overlay h1 { font-size: 16px; letter-spacing: 0.1em; }
    #overlay p { font-size: 13px; opacity: 0.7; max-width: 46ch; }
    #overlay .detail { font-size: 11px; opacity: 0.4; }
  </style>
</head>
<body>
  <canvas id="view"></canvas>
  <canvas id="mirror"></canvas>
  <header>
    <span class="title">TOILE<small>phase 2 — ceinture (bustier tenu) · v67</small></span>
    <span class="hud-col">
      <span id="hud">initialisation…</span>
      <span id="hint">glisser sur le tissu : le tirer · glisser à côté : tourner · clic droit + glisser : se déplacer · molette : zoom · R : reset</span>
    </span>
  </header>
  <div id="patternBox">
    <span class="label">PLAN DE COUPE</span>
    <canvas id="pattern" width="250" height="290"></canvas>
  </div>
  <div id="overlay" hidden></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
