<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TOILE — moteur de simulation textile · phase 0</title>
  <style>
    :root { color-scheme: dark; }
    * { margin: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      background: #0e0f12;
      color: #ede9df;
      font-family: ui-monospace, 'SF Mono', 'Cascadia Code', Menlo, monospace;
      overflow: hidden;
    }
    #view { width: 100vw; height: 100vh; display: block; touch-action: none; cursor: grab; }
    #view:active { cursor: grabbing; }
    /* 2D mirror of the WebGPU canvas: some systems fail to present WebGPU
       frames to screen while the content is correct — a plain 2D canvas
       always composites. Clicks pass through to #view underneath. */
    #mirror {
      position: fixed; inset: 0; width: 100vw; height: 100vh;
      pointer-events: none; z-index: 1;
    }
    header { z-index: 5; }
    /* 2D cutting-layout inset (CLO-style dual view). */
    #patternBox {
      position: fixed; left: 14px; bottom: 14px; z-index: 6;
      pointer-events: none;
      background: rgba(10, 11, 14, 0.55);
      border: 1px solid rgba(237, 233, 223, 0.15);
      border-radius: 6px; padding: 8px 10px 6px;
    }
    #patternBox .label {
      font-size: 10px; letter-spacing: 0.1em; opacity: 0.55; display: block;
      margin-bottom: 4px;
    }
    #pattern { display: block; background: rgba(20, 22, 27, 0.6); border-radius: 3px; }
    /* Atelier toolbar (freeform CAD): buttons over the 2D plan, grouped by
       function (créer · assembler · voir/agir) — the gaps ARE the grouping. */
    #atelier-bar { display: none; gap: 18px; margin-bottom: 6px; pointer-events: auto; }
    #atelier-bar.on { display: flex; }
    #atelier-bar .tgrp { display: flex; gap: 5px; }
    #atelier-bar button {
      font: inherit; font-size: 11px; letter-spacing: 0.04em;
      color: rgba(237, 233, 223, 0.82); background: rgba(40, 44, 52, 0.6);
      border: 1px solid rgba(237, 233, 223, 0.13); border-radius: 4px;
      padding: 3px 9px; cursor: pointer;
    }
    #atelier-bar button:hover { background: rgba(60, 66, 78, 0.95); color: rgba(237, 233, 223, 1); }
    #atelier-bar button.active { border-color: rgba(255, 159, 107, 0.9); color: rgba(255, 190, 150, 1); }
    /* Sélecteur de taille (à côté du bouton 👕). */
    #at-size {
      font: inherit; font-size: 11px; letter-spacing: 0.04em;
      color: rgba(237, 233, 223, 0.82); background: rgba(40, 44, 52, 0.6);
      border: 1px solid rgba(237, 233, 223, 0.13); border-radius: 4px;
      padding: 3px 6px; cursor: pointer;
    }
    #at-size:hover { background: rgba(60, 66, 78, 0.95); color: rgba(237, 233, 223, 1); }
    /* « Terminer » : contextuel (visible pendant un tracé), en accent pour dire
       « une action est en cours ». */
    #at-pen { border-color: rgba(255, 159, 107, 0.8); color: rgba(255, 190, 150, 1); }
    /* Choix de placement d'une pièce tracée (contextuel, sous la barre). */
    #place-chooser {
      display: flex; align-items: center; gap: 5px; margin-bottom: 6px;
      pointer-events: auto;
    }
    #place-chooser[hidden] { display: none; }
    #place-chooser .q { font-size: 11px; color: rgba(255, 190, 150, 1); margin-right: 4px; }
    #place-chooser button {
      font: inherit; font-size: 11px; letter-spacing: 0.04em;
      color: rgba(237, 233, 223, 0.9); background: rgba(40, 44, 52, 0.85);
      border: 1px solid rgba(255, 159, 107, 0.45); border-radius: 4px;
      padding: 3px 9px; cursor: pointer;
    }
    #place-chooser button:hover { background: rgba(70, 58, 48, 0.95); color: rgba(255, 210, 180, 1); }
    /* The Simulate button stands out: it's the "drape it" action. */
    #at-sim { border-color: rgba(120, 220, 150, 0.7); color: rgba(170, 240, 195, 1); font-weight: 700; }
    #at-sim.running { background: rgba(120, 220, 150, 0.22); }
    /* GRAND PLAN = la moitié de l'écran (fenêtre 2D | fenêtre 3D, façon CLO).
       La largeur se règle en tirant le séparateur central (--plan2d). */
    :root { --plan2d: 50vw; }
    #patternBox.big {
      left: 0; top: 40px; bottom: 0; right: auto; transform: none;
      width: var(--plan2d);
      background: rgba(8, 9, 12, 0.97); padding: 10px 12px 8px; z-index: 15;
      border-radius: 0; border-left: none; border-top: none; border-bottom: none;
    }
    /* La 3D se recadre dans la moitié droite (le ResizeObserver du canvas suit). */
    body.plan-split #view,
    body.plan-split #mirror {
      position: fixed; top: 0; left: var(--plan2d);
      width: calc(100vw - var(--plan2d)); height: 100vh;
    }
    /* Séparateur central : glisser pour ajuster le partage 2D / 3D. */
    #split-divider { display: none; position: fixed; top: 40px; bottom: 0; left: calc(var(--plan2d) - 4px); width: 9px; cursor: col-resize; z-index: 16; }
    body.plan-split #split-divider { display: block; }
    #split-divider::after {
      content: ''; position: absolute; left: 4px; top: 0; bottom: 0; width: 1px;
      background: rgba(237, 233, 223, 0.2);
    }
    #split-divider:hover::after, #split-divider.dragging::after { width: 3px; left: 3px; background: rgba(255, 159, 107, 0.7); }
    header {
      position: fixed; top: 0; left: 0; right: 0;
      display: flex; justify-content: space-between; align-items: baseline;
      padding: 14px 18px; pointer-events: none;
      font-size: 12px; letter-spacing: 0.08em;
    }
    header .title { font-weight: 700; }
    header .title small { font-weight: 400; opacity: 0.45; margin-left: 10px; }
    .hud-col { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
    #hud { opacity: 0.6; font-variant-numeric: tabular-nums; }
    #hint { opacity: 0.4; font-size: 11px; }
    /* Drop lil-gui below the header bar so it doesn't overlap the HUD. */
    .lil-gui.lil-root { top: 46px; z-index: 10; }
    #overlay {
      position: fixed; inset: 0; display: grid; place-content: center;
      background: #0e0f12; text-align: center; padding: 24px; gap: 10px;
      z-index: 20;
    }
    /* Author display:grid would otherwise defeat the hidden attribute, leaving
       an invisible full-screen layer that swallows every pointer event. */
    #overlay[hidden] { display: none; }
    #overlay h1 { font-size: 16px; letter-spacing: 0.1em; }
    #overlay p { font-size: 13px; opacity: 0.7; max-width: 46ch; }
    #overlay .detail { font-size: 11px; opacity: 0.4; }
  </style>
</head>
<body>
  <canvas id="view"></canvas>
  <canvas id="mirror"></canvas>
  <header>
    <span class="title">TOILE<small>phase 3 — avatars T-pose refaits proprement dans Blender · v132</small></span>
    <span class="hud-col">
      <span id="hud">initialisation…</span>
      <span id="hint">glisser sur le tissu : le tirer · glisser à côté : tourner · clic droit + glisser : se déplacer · molette : zoom · R : reset</span>
    </span>
  </header>
  <div id="patternBox">
    <span class="label">PLAN DE COUPE</span>
    <!-- Barre atelier, groupée par fonction (façon CLO) : CRÉER · ASSEMBLER ·
         VOIR/AGIR. « Terminer » est contextuel : il n'apparaît que pendant un
         tracé à la plume. -->
    <div id="atelier-bar">
      <span class="tgrp">
        <button id="at-tshirt" title="Charger le patron BOXY FIT (devant, dos, 2 manches, col) — coupe oversize, à la taille choisie">👕 T-shirt</button>
        <select id="at-size" title="Taille du t-shirt (tour de poitrine) — le patron se recharge à la nouvelle taille"></select>
        <button id="at-piece" title="Tracer une pièce à la plume sur la silhouette (le gabarit grandeur nature) — à la fermeture, tu choisis où elle va : devant, dos, bras, cou… ou libre">✎ Pièce</button>
        <button id="at-sleeves" title="Manches AUTOMATIQUES : deux tubes tout faits, posés et cousus en un clic (pour les dessiner toi-même : ✎ Pièce → Bras)">Manches auto</button>
        <button id="at-pen" hidden title="Fermer la forme dessinée (ou cliquer le premier point)">✓ Terminer</button>
      </span>
      <span class="tgrp">
        <button id="at-sew" title="Coudre deux bords : cliquez le bouton, puis le 1er bord, puis le 2e (les bords rouges apparaissent et attendent)">🪡 Coudre</button>
        <button id="at-del" title="Supprimer la pièce active — cliquer d'abord sa colonne (manche, col, pièce libre) · Ctrl+Z pour annuler">− Pièce</button>
      </span>
      <span class="tgrp">
        <button id="at-big" title="Plan 2D en demi-écran, à côté de la 3D — glisser le bord central pour ajuster le partage">⤢ Grand plan</button>
        <button id="at-sim" title="Draper la pièce sur le mannequin (lancer la simulation)">▶ Simuler</button>
      </span>
    </div>
    <!-- Choix de PLACEMENT d'une pièce fraîchement tracée : l'utilisateur dit
         quel endroit du corps la pièce couvrira (ou la laisse libre, posée là
         où elle a été dessinée sur la silhouette). -->
    <div id="place-chooser" hidden>
      <span class="q">Où va cette pièce ?</span>
      <button data-place="front" title="La pièce couvre le torse, côté devant (remplace le devant actuel)">Devant</button>
      <button data-place="back" title="La pièce couvre le torse, côté dos (remplace le dos actuel)">Dos</button>
      <button data-place="armR" title="La pièce s'enroule autour du bras droit et se coud à l'emmanchure">Bras droit</button>
      <button data-place="armL" title="La pièce s'enroule autour du bras gauche et se coud à l'emmanchure">Bras gauche</button>
      <button data-place="neck" title="La pièce s'enroule autour du cou (bande d'encolure)">Cou</button>
      <button data-place="free" title="La pièce reste posée devant le corps, là où elle a été dessinée sur la silhouette">Libre</button>
    </div>
    <canvas id="pattern" width="250" height="290"></canvas>
  </div>
  <div id="split-divider" title="Glisser pour ajuster le partage plan 2D / fenêtre 3D"></div>
  <div id="overlay" hidden></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
